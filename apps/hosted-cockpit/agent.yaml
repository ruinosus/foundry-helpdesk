kind: hosted
name: cockpit-expert
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "0.5"
  memory: 1Gi
environment_variables:
  # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING are injected
  # by the platform. These resolve from the azd environment at deploy time.
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${FOUNDRY_MODEL}
  - name: AZURE_SEARCH_ENDPOINT
    value: ${AZURE_SEARCH_ENDPOINT}
  # The second-domain KB (created data-plane by app.knowledge.ingest_cockpit),
  # not the helpdesk one — a fixed name, not an azd output.
  - name: AZURE_SEARCH_KNOWLEDGE_BASE
    value: cockpit-kb
