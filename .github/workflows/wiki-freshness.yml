name: Wiki freshness

# Surfaces deep-wiki staleness: if an area's source changed after its wiki bundle was
# generated, the bundle must be regenerated (wiki_builder + re-ingest) or the agent grounds
# in a wiki that no longer matches the code. NOT a required merge gate — regeneration needs
# the Foundry model (not available in basic CI) — so this is its own workflow that goes red
# when the wiki drifts, making it visible without blocking merges.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    name: deep-wiki tracks the code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so `git log` can date each area's last change
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Check the wiki is newer than its source
        run: uv run python -m eval.wiki_freshness_test
