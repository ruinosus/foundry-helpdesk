# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: foundry-helpdesk
metadata:
    template: foundry-helpdesk@0.1.0
services:
    backend:
        project: apps/backend
        host: containerapp
        language: docker
        docker:
            path: Dockerfile
            remoteBuild: true
    cockpit-expert:
        project: apps/hosted-cockpit
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    helpdesk-concierge:
        project: apps/hosted-agent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    platform-concierge:
        project: apps/hosted-platform
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    web:
        project: apps/frontend
        host: containerapp
        language: docker
        docker:
            path: Dockerfile
            remoteBuild: true
            buildArgs:
                - NEXT_PUBLIC_ENTRA_TENANT_ID=${NEXT_PUBLIC_ENTRA_TENANT_ID}
                - NEXT_PUBLIC_ENTRA_SPA_CLIENT_ID=${NEXT_PUBLIC_ENTRA_SPA_CLIENT_ID}
                - NEXT_PUBLIC_ENTRA_API_CLIENT_ID=${NEXT_PUBLIC_ENTRA_API_CLIENT_ID}
