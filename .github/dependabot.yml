version: 2
updates:
  # Backend (uv / pyproject)
  - package-ecosystem: uv
    directory: /apps/backend
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]
    ignore:
      # Version-pinned transitively by agent-framework — let the framework drive
      # them; independent bumps make the resolution unsatisfiable.
      - dependency-name: azure-search-documents
      - dependency-name: fastapi
      - dependency-name: agent-framework*

  # Hosted agent (pip / requirements.txt)
  - package-ecosystem: pip
    directory: /apps/hosted-agent
    schedule: { interval: weekly }

  # Frontend (npm)
  - package-ecosystem: npm
    directory: /apps/frontend
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }

  # Container base images
  - package-ecosystem: docker
    directories:
      - /apps/backend
      - /apps/frontend
      - /apps/hosted-agent
    schedule: { interval: weekly }
    ignore:
      # Runtime versions are pinned deliberately (Python 3.12, Node 20) — bump by hand.
      - dependency-name: python
      - dependency-name: node
