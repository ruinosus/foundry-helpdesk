name: CI

# Runs on every PR and on pushes to main. The hard gates (policy self-test,
# typecheck, build, bicep) must pass; lint is advisory for now (continue-on-error).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend · lint + policy gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint (ruff)
        run: uvx ruff check .
        continue-on-error: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Policy gate (planted-violation self-test)
        run: uv run python -m eval.run_eval --self-test

  frontend:
    name: Frontend · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build

  infra:
    name: Infra · bicep build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep CLI
        run: |
          curl -sLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep && sudo mv bicep /usr/local/bin/bicep
          bicep --version
      - name: Compile-check Bicep
        run: bicep build infra/main.bicep --stdout > /dev/null

  # Single required status check for branch protection — green only when all
  # matrix jobs above succeed (so you protect one check, not three).
  ci-ok:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, infra]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          [ "${{ needs.backend.result }}" = "success" ] \
          && [ "${{ needs.frontend.result }}" = "success" ] \
          && [ "${{ needs.infra.result }}" = "success" ] \
          || { echo "One or more CI jobs failed"; exit 1; }
