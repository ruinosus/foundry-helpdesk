name: Feature request
description: Propose a capability or improvement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? What's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Backend (apps/backend)
        - Frontend (apps/frontend)
        - Hosted agent (apps/hosted-agent)
        - Infra / azd
        - Eval / safety
        - Docs
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
